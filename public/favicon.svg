    <rect x="11" y="13" width="3.5" height="13" rx="1" fill="rgba(255,255,255,0.7)"/>
    <rect x="16" y="10" width="3.5" height="16" rx="1" fill="rgba(255,255,255,0.85)"/>
    <rect x="21" y="6"  width="3.5" height="20" rx="1" fill="rgba(255,255,255,1)"/>

    <!-- Petit point en haut à droite (brand dot) -->
